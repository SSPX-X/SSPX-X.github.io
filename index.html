<!DOCTYPE html>
<html>
<head>
    <title>abroba</title>
    <style>
        p { font-family: arial; color: white; }
        h1 { font-family: courier new; color: white; }
        a { font-family: arial; color: rgb(200,200,200); text-decoration: none; }
    </style>
</head>
<body style="background-color: black;">
    <h1>aeiou AEIOU</h1>

    <p>aeiou AEIOU</p>
    <p>queijo: mussarela</p>
    <a href="https://sspx-x.github.io/queijo">queijo</a>

    <div>
        <input type="password" id="passwordInput" placeholder="Digite a senha" />
        <button onclick="checkPassword()">Entrar</button>
    </div>

    <script>
        function checkPassword() {
            const password = document.getElementById("passwordInput").value;
            if (password === "LIBERTADOR") {
                window.location.href = "libertador.html";
            } else if (password === "CICLO") {
                window.location.href = "ciclo.html";
            } else if (password === "VÉU") {
                window.location.href = "veu.html";
            } else {
                alert("Senha incorreta.");
            }
        }
    </script>
</body>
